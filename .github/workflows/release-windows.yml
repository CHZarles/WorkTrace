name: Release (Windows)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: "3.41.1"
          cache: true

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Install Inno Setup
        shell: pwsh
        run: |
          if (Get-Command iscc.exe -ErrorAction SilentlyContinue) {
            Write-Host "ISCC already available."
            exit 0
          }
          choco install innosetup --no-progress -y
          $iscc = Join-Path ${env:ProgramFiles(x86)} "Inno Setup 6\\ISCC.exe"
          if (!(Test-Path $iscc)) {
            throw "ISCC.exe not found after installation."
          }

      - name: Ensure Flutter Windows project files
        shell: pwsh
        run: |
          if (!(Test-Path ".\\recorderphone_ui")) {
            New-Item -ItemType Directory -Force ".\\recorderphone_ui" | Out-Null
          }
          Push-Location ".\\recorderphone_ui"
          flutter create --platforms=windows --overwrite .
          Pop-Location

      - name: Package (installer)
        shell: pwsh
        run: |
          $maxAttempts = 2
          for ($attempt = 1; $attempt -le $maxAttempts; $attempt++) {
            Write-Host "Packaging attempt $attempt / $maxAttempts"
            powershell -ExecutionPolicy Bypass -File .\dev\package-windows.ps1 -Installer
            if ($LASTEXITCODE -eq 0) { break }
            if ($attempt -ge $maxAttempts) {
              throw "package-windows.ps1 failed after $maxAttempts attempts"
            }
            Write-Host "Packaging failed, retrying after short delay..."
            Start-Sleep -Seconds 10
          }

          $tag = "${env:GITHUB_REF_NAME}"
          if ([string]::IsNullOrWhiteSpace($tag)) { $tag = "manual" }

          $setupSrc = Join-Path $env:GITHUB_WORKSPACE "dist\\windows\\RecorderPhone-Setup.exe"
          $setupDst = Join-Path $env:GITHUB_WORKSPACE ("dist\\windows\\RecorderPhone-" + $tag + "-windows-setup.exe")
          if (Test-Path $setupDst) { Remove-Item -Force $setupDst }
          Move-Item -Force $setupSrc $setupDst

          "SETUP_PATH=$setupDst" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
        id: package

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: RecorderPhone-${{ github.ref_name }}-windows
          path: ${{ steps.package.outputs.SETUP_PATH }}

      - name: Check release notes
        if: startsWith(github.ref, 'refs/tags/')
        id: notes
        shell: pwsh
        run: |
          $tag = "${env:GITHUB_REF_NAME}"
          $notes = Join-Path $env:GITHUB_WORKSPACE ("release-notes\\" + $tag + ".md")
          if (Test-Path $notes) {
            "HAS_NOTES=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          } else {
            "HAS_NOTES=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          }

      - name: Publish GitHub Release (with notes)
        if: startsWith(github.ref, 'refs/tags/') && steps.notes.outputs.HAS_NOTES == 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.package.outputs.SETUP_PATH }}
          body_path: release-notes/${{ github.ref_name }}.md

      - name: Publish GitHub Release (auto notes)
        if: startsWith(github.ref, 'refs/tags/') && steps.notes.outputs.HAS_NOTES != 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.package.outputs.SETUP_PATH }}
          generate_release_notes: true
